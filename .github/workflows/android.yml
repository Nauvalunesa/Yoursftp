name: Android CI Build

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Diperlukan untuk membuat rilis dan mengunggah aset

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Grant Execute Permission to Gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: YoursFTP-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk

    # Membuat atau memperbarui rilis GitHub secara otomatis
    - name: Create or Update GitHub Release
      if: github.event_name == 'push'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Tentukan tag berdasarkan event (apakah tag v* atau push biasa ke main)
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          TAG_NAME="${{ github.ref_name }}"
          RELEASE_TITLE="Release $TAG_NAME"
          PRERELEASE_FLAG=""
        else
          TAG_NAME="nightly"
          RELEASE_TITLE="Nightly Build"
          PRERELEASE_FLAG="--prerelease"
          
          # Hapus rilis & tag 'nightly' lama jika ada agar tetap menjadi 1 versi rolling
          gh release delete "$TAG_NAME" --cleanup-tag --yes || true
        fi
        
        # Buat rilis baru dan unggah APK
        gh release create "$TAG_NAME" \
          --title "$RELEASE_TITLE" \
          $PRERELEASE_FLAG \
          --notes "Rilis otomatis dari GitHub Actions. Commit terakhir: ${{ github.sha }}." \
          app/build/outputs/apk/debug/app-debug.apk
